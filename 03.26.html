<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const 입력 = prompt('입력하라','')
        const 끝자리 = 입력[입력.length -1]
        if(끝자리==="0" ||
           끝자리==="2" ||
           끝자리==="4" ||
           끝자리==="6" ||
           끝자리==="8"){
            alert(`${입력}은 짝수입니다.`)
           }else{
            alert(`${입력}은 홀수입니다.`)
           }


        const a = (prompt('정수 숫자를 입력해주세요.',''))
        if(a>0){
           alert(`${a}는 양수입니다.`)
        }else if(a<0){
           alert(`${a}는 음수입니다.`)
        }else{
          alert('0입니다.')
        }

        const b = Number(prompt('홀짝 숫자를 입력해쥇요.',''))
        if(b%2 === 0){
            alert('짝수입니다.')
        }else{
            alert('홀수입니다.')
        }
    </script>
</body>
</html>
